name: Update D-Day Progress
on:
  schedule:
    - cron: "0 0 * * *" # Runs automatically every single day at midnight!
  workflow_dispatch: # Allows you to run it manually right now!

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - name: Calculate Magical Progress
        run: |
          START=$(date -d "1998-03-10" +%s)
          END=$(date -d "2028-03-10" +%s)
          NOW=$(date +%s)
          
          TOTAL=$((END - START))
          CURRENT=$((NOW - START))
          PERCENT=$((CURRENT * 100 / TOTAL))
          
          # This replaces a placeholder in your README with a beautiful native progress bar!
          BAR=$(printf "▓%.0s" $(seq 1 $((PERCENT / 5))))$(printf "░%.0s" $(seq 1 $((20 - PERCENT / 5))))
          SED_REPLACE="Progress: $BAR $PERCENT%"
          
          sed -i "s/Progress:.*/$SED_REPLACE/g" README.md
          
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet && echo "No changes" || (git commit -am "🔮 Wizard status updated!" && git push)
