name: Update Profile D-Day

on:
  schedule:
    - cron: '0 0 * * *' # Triggers every single midnight!
  workflow_dispatch: # Allows you to manually trigger it anytime to test!

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repo
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Run D-Day Script
      run: python update_dday.py

    - name: Commit and Push Changes
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add README.md
        git diff-index --quiet HEAD || git commit -m "🤖 Auto-updated D-Day countdown!"
        git push
